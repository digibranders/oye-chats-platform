name: Deploy Widget to CDN

on:
  push:
    branches: [main]
    paths: ['widget/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        working-directory: widget
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.oyechats.com
          VITE_BUILD_TIMESTAMP: ${{ github.sha }}

      - name: Verify build output exists
        run: |
          test -f widget/dist/oyechats-widget.js || { echo "❌ Build output missing: oyechats-widget.js"; exit 1; }
          JS_SIZE=$(stat -c%s widget/dist/oyechats-widget.js 2>/dev/null || stat -f%z widget/dist/oyechats-widget.js)
          echo "✅ Widget JS size: ${JS_SIZE} bytes (CSS inlined — single-file bundle)"
          if [ "$JS_SIZE" -lt 10000 ]; then echo "❌ Widget JS suspiciously small"; exit 1; fi

      # Upload versioned backup first (rollback safety), then overwrite latest
      - name: Upload versioned JS backup
        uses: cloudflare/wrangler-action@v3
        with:
          command: >-
            r2 object put oyechats-cdn/versions/oyechats-widget-${{ github.sha }}.js
            --file widget/dist/oyechats-widget.js
            --content-type "text/javascript"
            --cache-control "public, max-age=31536000, immutable"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload JS to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          command: >-
            r2 object put oyechats-cdn/oyechats-widget.js
            --file widget/dist/oyechats-widget.js
            --content-type "text/javascript"
            --cache-control "public, max-age=60, s-maxage=60"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      # CSS is now inlined into the JS bundle (Shadow DOM isolation) — no separate CSS upload needed

      - name: Purge Cloudflare CDN cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ]; then
            echo "❌ CF_ZONE_ID secret is not set — cannot purge CDN cache"
            exit 1
          fi
          RESPONSE=$(curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"files":["https://cdn.oyechats.com/oyechats-widget.js"]}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || { echo "❌ Cache purge failed"; exit 1; }
          echo "✅ CDN cache purged successfully"
