name: Deploy Widget to CDN

on:
  push:
    branches: [main]
    paths: ['widget/**']
  workflow_dispatch:

jobs:
  # Require CI to pass before deploying to production
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        working-directory: widget
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.oyechats.com

      - name: Verify build output exists
        run: |
          test -f widget/dist/oyechats-widget.js || { echo "❌ Build output missing: oyechats-widget.js"; exit 1; }
          test -f widget/dist/oyechats-widget.css || { echo "❌ Build output missing: oyechats-widget.css"; exit 1; }
          JS_SIZE=$(stat -c%s widget/dist/oyechats-widget.js 2>/dev/null || stat -f%z widget/dist/oyechats-widget.js)
          echo "✅ Widget JS size: ${JS_SIZE} bytes"
          if [ "$JS_SIZE" -lt 10000 ]; then echo "❌ Widget JS suspiciously small"; exit 1; fi

      # Upload versioned backup first (rollback safety), then overwrite latest
      - name: Upload versioned JS backup
        uses: cloudflare/wrangler-action@v3
        with:
          command: r2 object put oyechats-cdn/versions/oyechats-widget-${{ github.sha }}.js --file widget/dist/oyechats-widget.js --content-type "text/javascript"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload JS to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          command: r2 object put oyechats-cdn/oyechats-widget.js --file widget/dist/oyechats-widget.js --content-type "text/javascript"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload CSS to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          command: r2 object put oyechats-cdn/oyechats-widget.css --file widget/dist/oyechats-widget.css --content-type "text/css"
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Purge Cloudflare CDN cache
        if: ${{ secrets.CF_ZONE_ID != '' }}
        run: |
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files":["https://cdn.oyechats.com/oyechats-widget.js","https://cdn.oyechats.com/oyechats-widget.css"]}' \
            && echo "✅ CDN cache purged" || echo "⚠️ Cache purge failed (non-fatal)"
