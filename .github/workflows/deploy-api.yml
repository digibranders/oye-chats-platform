name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/deploy-api.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_APPLICATION_KEY: ${{ secrets.R2_APPLICATION_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          # Toggle-able feature flags (set in GitHub secrets to flip without a code push)
          RELEVANCE_GATE_ENABLED: ${{ secrets.RELEVANCE_GATE_ENABLED }}
          CHUNK_ENRICHMENT_ENABLED: ${{ secrets.CHUNK_ENRICHMENT_ENABLED }}
          CRAWLER_JS_ALL_PAGES: ${{ secrets.CRAWLER_JS_ALL_PAGES }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: DB_URL,GOOGLE_API_KEY,OPENAI_API_KEY,CORS_ORIGINS,R2_KEY_ID,R2_APPLICATION_KEY,R2_BUCKET_NAME,R2_ENDPOINT,SENTRY_DSN_BACKEND,LANGFUSE_SECRET_KEY,LANGFUSE_PUBLIC_KEY,BREVO_API_KEY,REDIS_URL,RELEVANCE_GATE_ENABLED,CHUNK_ENRICHMENT_ENABLED,CRAWLER_JS_ALL_PAGES
          script: |
            set -e  # Abort on any command failure — don't deploy broken code

            cd /opt/oyechats/platform

            # Pull latest code FIRST (so .env write applies to new code)
            git pull origin main

            # Generate .env from secrets + hardcoded prod values
            printf '%s\n' \
              "DB_URL=${DB_URL}" \
              "GOOGLE_API_KEY=${GOOGLE_API_KEY}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "APP_ENV=production" \
              "CORS_ORIGINS=${CORS_ORIGINS}" \
              "R2_KEY_ID=${R2_KEY_ID}" \
              "R2_APPLICATION_KEY=${R2_APPLICATION_KEY}" \
              "R2_BUCKET_NAME=${R2_BUCKET_NAME}" \
              "R2_ENDPOINT=${R2_ENDPOINT}" \
              "SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND}" \
              "LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}" \
              "LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}" \
              "LANGFUSE_HOST=https://cloud.langfuse.com" \
              "LANGFUSE_FORCE_DISABLE=true" \
              "BREVO_API_KEY=${BREVO_API_KEY}" \
              "REDIS_URL=${REDIS_URL}" \
              "LLM_MODEL=openai/gpt-5.4-mini" \
              "FALLBACK_MODEL=gemini/gemini-2.5-flash" \
              "RERANK_ENABLED=true" \
              "RERANK_TOP_N=5" \
              "CAG_LITE_THRESHOLD=20" \
              "CHUNK_SIZE=1000" \
              "CHUNK_OVERLAP=200" \
              "RELEVANCE_THRESHOLD=0.5" \
              "GATE_MODEL=gemini/gemini-2.5-flash" \
              "ENRICHMENT_MODEL=gemini/gemini-2.5-flash" \
              "CRAWLER_BROWSER_RECYCLE=10" \
              "RELEVANCE_GATE_ENABLED=${RELEVANCE_GATE_ENABLED}" \
              "CHUNK_ENRICHMENT_ENABLED=${CHUNK_ENRICHMENT_ENABLED}" \
              "CRAWLER_JS_ALL_PAGES=${CRAWLER_JS_ALL_PAGES}" \
              > api/.env

            # Sync dependencies
            cd api
            /root/.local/bin/uv sync

            # Install Playwright only if not already present
            if ! /root/.local/bin/uv run python -c "from playwright.sync_api import sync_playwright" 2>/dev/null; then
              /root/.local/bin/uv run playwright install --with-deps chromium
            fi

            # Run migrations
            /root/.local/bin/uv run alembic upgrade head

            # Restart service
            systemctl restart oyechats-api

            # Health check — wait for server startup then retry
            # Server takes ~25s to start (2 uvicorn workers + Sentry + DB init)
            echo "⏳ Waiting 15s for server startup..."
            sleep 15
            set +e  # Temporarily disable errexit for the retry loop
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Deploy successful (attempt $i)"
                exit 0
              fi
              echo "⏳ Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "❌ Deploy failed — server not responding after 45s"
            # Print service status for debugging
            systemctl status oyechats-api --no-pager || true
            journalctl -u oyechats-api --since '1 minute ago' --no-pager -n 30 || true
            exit 1
