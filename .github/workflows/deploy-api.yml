name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/deploy-api.yml']
  workflow_dispatch:

jobs:
  # Require CI to pass before deploying to production
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_APPLICATION_KEY: ${{ secrets.R2_APPLICATION_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: DB_URL,GOOGLE_API_KEY,OPENAI_API_KEY,CORS_ORIGINS,R2_KEY_ID,R2_APPLICATION_KEY,R2_BUCKET_NAME,R2_ENDPOINT,SENTRY_DSN_BACKEND,LANGFUSE_SECRET_KEY,LANGFUSE_PUBLIC_KEY
          script: |
            set -e  # Abort on any command failure — don't deploy broken code

            cd /opt/oyechats/platform

            # Pull latest code FIRST (so .env write applies to new code)
            git pull origin main

            # Generate .env from secrets
            printf '%s\n' \
              "DB_URL=${DB_URL}" \
              "GOOGLE_API_KEY=${GOOGLE_API_KEY}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "APP_ENV=production" \
              "CORS_ORIGINS=${CORS_ORIGINS}" \
              "R2_KEY_ID=${R2_KEY_ID}" \
              "R2_APPLICATION_KEY=${R2_APPLICATION_KEY}" \
              "R2_BUCKET_NAME=${R2_BUCKET_NAME}" \
              "R2_ENDPOINT=${R2_ENDPOINT}" \
              "SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND}" \
              "LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}" \
              "LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}" \
              "LANGFUSE_HOST=https://cloud.langfuse.com" \
              > api/.env

            # Sync dependencies
            cd api
            /root/.local/bin/uv sync

            # Install Playwright only if not already present
            if ! /root/.local/bin/uv run python -c "from playwright.sync_api import sync_playwright" 2>/dev/null; then
              /root/.local/bin/uv run playwright install --with-deps chromium
            fi

            # Run migrations
            /root/.local/bin/uv run alembic upgrade head

            # Restart service
            systemctl restart oyechats-api

            # Health check — retry up to 5 times (2s apart)
            for i in 1 2 3 4 5; do
              sleep 2
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Deploy successful (attempt $i)"
                exit 0
              fi
              echo "⏳ Health check attempt $i failed, retrying..."
            done
            echo "❌ Deploy failed — server not responding after 10s"
            exit 1
