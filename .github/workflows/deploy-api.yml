name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/deploy-api.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_APPLICATION_KEY: ${{ secrets.R2_APPLICATION_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: DB_URL,GOOGLE_API_KEY,CORS_ORIGINS,R2_KEY_ID,R2_APPLICATION_KEY,R2_BUCKET_NAME,R2_ENDPOINT,SENTRY_DSN_BACKEND,LANGFUSE_SECRET_KEY,LANGFUSE_PUBLIC_KEY
          script: |
            cd /opt/oyechats/platform

            # Generate .env from secrets (no leading spaces)
            printf '%s\n' \
              "DB_URL=${DB_URL}" \
              "GOOGLE_API_KEY=${GOOGLE_API_KEY}" \
              "APP_ENV=production" \
              "CORS_ORIGINS=${CORS_ORIGINS}" \
              "R2_KEY_ID=${R2_KEY_ID}" \
              "R2_APPLICATION_KEY=${R2_APPLICATION_KEY}" \
              "R2_BUCKET_NAME=${R2_BUCKET_NAME}" \
              "R2_ENDPOINT=${R2_ENDPOINT}" \
              "SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND}" \
              "LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}" \
              "LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}" \
              "LANGFUSE_HOST=https://cloud.langfuse.com" \
              "CF_API_TOKEN=${CF_API_TOKEN}" \
              "CF_ACCOUNT_ID=${CF_ACCOUNT_ID}" \
              > .env

            # Pull latest code
            git pull origin main

            # Sync dependencies
            cd api
            /home/oyechats/.local/bin/uv sync

            # Run migrations
            /home/oyechats/.local/bin/uv run alembic upgrade head

            # Restart service
            sudo systemctl restart oyechats-api

            # Health check
            sleep 3
            curl -sf http://localhost:8000/docs > /dev/null && echo "Deploy successful" || echo "Deploy failed"
