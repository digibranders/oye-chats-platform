name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/deploy-api.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_APPLICATION_KEY: ${{ secrets.R2_APPLICATION_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          # Pass the deployed git SHA so Sentry tags every event with a
          # release; spikes can then be pinned to a specific commit.
          SENTRY_RELEASE: ${{ github.sha }}
          # Toggle-able feature flags (set in GitHub secrets to flip without a code push)
          RELEVANCE_GATE_ENABLED: ${{ secrets.RELEVANCE_GATE_ENABLED }}
          CHUNK_ENRICHMENT_ENABLED: ${{ secrets.CHUNK_ENRICHMENT_ENABLED }}
          CRAWLER_JS_ALL_PAGES: ${{ secrets.CRAWLER_JS_ALL_PAGES }}
          RERANK_ENABLED: ${{ secrets.RERANK_ENABLED }}
          # Billing — Stripe (international) + Razorpay (primary, INR/UPI).
          # Missing values become empty strings on the droplet, which
          # config.py treats as "provider disabled". Webhook secrets are
          # required for inbound callback signature verification.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          # Frontend URL for Stripe success/cancel and Razorpay return redirects.
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          # Google OAuth (Sign in with Google). All five are required — the
          # frontend probes /auth/google/status on every page load and hides
          # the button when the backend isn't configured. Missing any of
          # these in the secrets set silently breaks production OAuth on
          # the next deploy because this workflow rewrites .env in full.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          OAUTH_SUCCESS_REDIRECT_URL: ${{ secrets.OAUTH_SUCCESS_REDIRECT_URL }}
          OAUTH_STATE_SECRET: ${{ secrets.OAUTH_STATE_SECRET }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: DB_URL,GOOGLE_API_KEY,OPENAI_API_KEY,CORS_ORIGINS,R2_KEY_ID,R2_APPLICATION_KEY,R2_BUCKET_NAME,R2_ENDPOINT,SENTRY_DSN_BACKEND,SENTRY_RELEASE,LANGFUSE_SECRET_KEY,LANGFUSE_PUBLIC_KEY,BREVO_API_KEY,REDIS_URL,RELEVANCE_GATE_ENABLED,CHUNK_ENRICHMENT_ENABLED,CRAWLER_JS_ALL_PAGES,RERANK_ENABLED,STRIPE_SECRET_KEY,STRIPE_PUBLISHABLE_KEY,STRIPE_WEBHOOK_SECRET,RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET,RAZORPAY_WEBHOOK_SECRET,FRONTEND_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,OAUTH_SUCCESS_REDIRECT_URL,OAUTH_STATE_SECRET
          script: |
            set -e  # Abort on any command failure — don't deploy broken code

            cd /opt/oyechats/platform

            # Make the working tree match origin/main verbatim before
            # pulling. Operators occasionally hotfix files in place
            # (scp + restart) when prod is on fire; without this reset,
            # those local edits make `git pull` abort with "would be
            # overwritten by merge". Resetting is safe because:
            #   - The committed source-of-truth lives on origin/main.
            #   - Any in-place edit that survives a deploy is a bug
            #     waiting to happen — better to lose it loudly here
            #     than ship divergent code silently.
            #   - .env is .gitignored, so it's untouched.
            #   - reset --hard discards tracked-file changes only;
            #     untracked files (.env.bak.*, etc.) are kept.
            git fetch origin main
            git reset --hard origin/main
            # Pull is now a no-op but kept for clarity and as a
            # defence in case future scripts add something between
            # reset and reset.
            git pull origin main

            # Generate .env from secrets + hardcoded prod values
            printf '%s\n' \
              "DB_URL=${DB_URL}" \
              "GOOGLE_API_KEY=${GOOGLE_API_KEY}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "APP_ENV=production" \
              "CORS_ORIGINS=${CORS_ORIGINS}" \
              "R2_KEY_ID=${R2_KEY_ID}" \
              "R2_APPLICATION_KEY=${R2_APPLICATION_KEY}" \
              "R2_BUCKET_NAME=${R2_BUCKET_NAME}" \
              "R2_ENDPOINT=${R2_ENDPOINT}" \
              "SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND}" \
              "SENTRY_RELEASE=${SENTRY_RELEASE}" \
              "LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}" \
              "LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}" \
              "LANGFUSE_HOST=https://cloud.langfuse.com" \
              "OTEL_BSP_SCHEDULE_DELAY=1000" \
              "BREVO_API_KEY=${BREVO_API_KEY}" \
              "REDIS_URL=${REDIS_URL}" \
              "LLM_MODEL=openai/gpt-5.4-mini" \
              "FALLBACK_MODEL=gemini/gemini-2.5-flash" \
              "RERANK_ENABLED=${RERANK_ENABLED}" \
              "RERANK_TOP_N=5" \
              "CAG_LITE_THRESHOLD=20" \
              "CHUNK_SIZE=1000" \
              "CHUNK_OVERLAP=200" \
              "RELEVANCE_THRESHOLD=0.55" \
              "GATE_MODEL=gemini/gemini-2.5-flash" \
              "ENRICHMENT_MODEL=gemini/gemini-2.5-flash" \
              "CRAWLER_BROWSER_RECYCLE=10" \
              "RELEVANCE_GATE_ENABLED=${RELEVANCE_GATE_ENABLED}" \
              "CHUNK_ENRICHMENT_ENABLED=${CHUNK_ENRICHMENT_ENABLED}" \
              "CRAWLER_JS_ALL_PAGES=${CRAWLER_JS_ALL_PAGES}" \
              "WORKER_ENABLED=true" \
              "MODERATION_ENABLED=true" \
              "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" \
              "STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" \
              "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}" \
              "RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}" \
              "RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}" \
              "RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}" \
              "FRONTEND_URL=${FRONTEND_URL}" \
              "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
              "GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}" \
              "OAUTH_SUCCESS_REDIRECT_URL=${OAUTH_SUCCESS_REDIRECT_URL}" \
              "OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET}" \
              > api/.env

            # Sync dependencies
            cd api
            /root/.local/bin/uv sync

            # Install Playwright only if not already present
            if ! /root/.local/bin/uv run python -c "from playwright.sync_api import sync_playwright" 2>/dev/null; then
              /root/.local/bin/uv run playwright install --with-deps chromium
            fi

            # Run migrations
            /root/.local/bin/uv run alembic upgrade head

            # Sync systemd units from the repo (repo is source of truth).
            # This ensures the worker — and any future unit-file edits — are
            # picked up on every deploy instead of drifting from the repo.
            cp /opt/oyechats/platform/api/systemd/oyechats-api.service /etc/systemd/system/
            cp /opt/oyechats/platform/api/systemd/oyechats-worker.service /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable oyechats-api oyechats-worker

            # Restart worker FIRST so its heartbeat is fresh before the new
            # API comes up — the deploy gate hits /health/full, which 503s
            # when the worker heartbeat is missing, so a stale worker would
            # fail the deploy. Worker first → API second avoids that race.
            systemctl restart oyechats-worker
            systemctl restart oyechats-api

            # Reload Nginx if config exists (Phase 1 scalability: reverse proxy)
            if [ -f /etc/nginx/sites-enabled/oyechats-api.conf ]; then
              nginx -t && systemctl reload nginx
            fi

            # Deploy gate hits /health/full (DB + Redis + worker), not
            # /health (DB + Redis only). /health is for LB probes and must
            # not flap on worker hiccups; /health/full is the strict check
            # that enforces a complete deploy before this job goes green.
            # Server takes ~25s to start (Gunicorn + Sentry + DB init).
            echo "⏳ Waiting 15s for server startup..."
            sleep 15
            set +e  # Temporarily disable errexit for the retry loop
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:8000/health/full > /dev/null 2>&1; then
                echo "✅ Deploy successful (attempt $i)"
                exit 0
              fi
              echo "⏳ Health check attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "❌ Deploy failed — server not responding after 45s"
            # Print service status for debugging
            systemctl status oyechats-api oyechats-worker --no-pager || true
            journalctl -u oyechats-api --since '1 minute ago' --no-pager -n 30 || true
            journalctl -u oyechats-worker --since '1 minute ago' --no-pager -n 20 || true
            exit 1
