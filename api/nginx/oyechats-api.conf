# OyeChats API — Nginx reverse proxy configuration
#
# Install: symlink this file into /etc/nginx/sites-enabled/
#   sudo ln -s /path/to/oyechats-api.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Handles: TLS termination, request buffering, WebSocket upgrade,
# SSE proxy (no buffering), connection limiting, and static file caching.

upstream oyechats_api {
    # ip_hash ensures WebSocket connections from the same client always
    # hit the same worker — required until Phase 3 (Redis pub/sub WS).
    ip_hash;
    server 127.0.0.1:8000;
}

# Rate limiting zone: 10 requests/second per IP (burst to 20)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name api.oyechats.com;

    # Redirect HTTP → HTTPS (uncomment after TLS is configured)
    # return 301 https://$host$request_uri;

    # ── For initial testing without TLS, include the locations below ──
    # Remove this block and uncomment the redirect above once TLS is live.
    include /etc/nginx/snippets/oyechats-locations.conf;
}

