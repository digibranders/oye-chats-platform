# OyeChats API — Nginx location blocks
# Included by oyechats-api.conf (both HTTP and HTTPS server blocks).
#
# Copy to /etc/nginx/snippets/oyechats-locations.conf on the server.

# Max upload size — matches _MAX_TOTAL_UPLOAD in document_routes.py (50MB + margin)
client_max_body_size 60M;

# ── WebSocket endpoints (/ws/) ──────────────────────────────────────────────
# Long-lived connections for live chat. 24h read timeout covers idle sessions.
location /ws/ {
    proxy_pass http://oyechats_api;
    proxy_http_version 1.1;

    # WebSocket upgrade headers
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Preserve client IP for rate limiting and logging
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 24h timeout for idle WebSocket connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# ── SSE streaming endpoints (/chat/stream) ──────────────────────────────────
# Server-Sent Events must not be buffered — tokens should arrive immediately.
location /chat/stream {
    proxy_pass http://oyechats_api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Disable buffering for streaming
    proxy_buffering off;
    proxy_cache off;

    # No timeout on streaming — the app handles its own timeouts
    proxy_read_timeout 300s;
}

# ── Crawl endpoint (long-running) ──────────────────────────────────────────
# URL crawling can take 10+ minutes for large sites.
location /crawl {
    proxy_pass http://oyechats_api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 660s;  # 11 min — above CRAWL_SUBPROCESS_TIMEOUT (600s)
}

# ── Health checks (no rate limiting) ────────────────────────────────────────
location /health {
    proxy_pass http://oyechats_api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Short timeout — health checks should be fast
    proxy_read_timeout 10s;
}

# ── Default: all other API endpoints ────────────────────────────────────────
location / {
    proxy_pass http://oyechats_api;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate limiting: 10 req/s per IP, burst to 20 with nodelay
    limit_req zone=api_limit burst=20 nodelay;

    # 65s — slightly above the 60s app timeout in middleware.py
    proxy_read_timeout 65s;

    # Buffer request bodies to avoid tying up the app worker
    proxy_request_buffering on;
}
